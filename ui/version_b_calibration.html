<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>版本 B - Trust Calibration 介面</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-white text-gray-900">
  <main class="mx-auto flex min-h-screen max-w-3xl items-center justify-center px-6 py-12">
    <section class="w-full rounded-2xl border border-gray-200 bg-white p-8 shadow-lg">
      <h1 class="mb-6 text-2xl font-bold">AI 情緒辨識推薦卡片</h1>

      <div class="mb-6 rounded-xl border border-gray-200 bg-gray-50 p-5">
        <p class="text-sm font-semibold uppercase tracking-wide text-gray-600">Prediction</p>
        <p class="mt-2 text-2xl font-bold">分析結果：傾向負向情緒</p>
      </div>

      <div class="mb-6 rounded-xl border border-gray-300 p-5">
        <p class="text-sm font-semibold uppercase tracking-wide text-gray-600">Confidence</p>
        <div class="mt-2 flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
          <p class="text-2xl font-bold">相對機率：51.16%</p>
          <p class="rounded-md border border-amber-300 bg-amber-100 px-3 py-2 text-sm font-semibold text-amber-800">
            ⚠️ 模型可能過度依賴特定時間詞彙，請謹慎參考。
          </p>
        </div>
      </div>

      <div class="mb-6 rounded-xl border border-gray-200 p-5">
        <p class="text-sm font-semibold uppercase tracking-wide text-gray-600">Top factors</p>
        <ul class="mt-3 space-y-2 text-base">
          <li class="rounded-md bg-gray-100 px-3 py-2">很</li>
          <li class="rounded-md bg-gray-100 px-3 py-2">已經</li>
        </ul>
      </div>

      <div class="mb-8 rounded-xl border border-amber-300 bg-amber-50 p-5">
        <p class="text-sm font-semibold uppercase tracking-wide text-amber-800">Why not</p>
        <p class="mt-2 text-base leading-relaxed text-amber-900">
          💡 反事實檢查 (Counterfactual)：AI 目前高度依賴「很」與「已經」。
          如果將「很久了」改成「稍等」，您認為情緒是否會不同？
        </p>
      </div>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <button
          type="button"
          class="rounded-xl border border-gray-900 bg-white px-5 py-4 text-base font-semibold text-gray-900 transition hover:bg-gray-100"
        >
          ✅ 同意 AI 判斷
        </button>
        <button
          type="button"
          class="rounded-xl border border-gray-900 bg-white px-5 py-4 text-base font-semibold text-gray-900 transition hover:bg-gray-100"
        >
          ✍️ 拒絕並人工修正
        </button>
      </div>
    </section>
  </main>
</body>
</html>
