<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>版本 A - Over-trust 介面</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-white text-black">
  <main class="mx-auto flex min-h-screen max-w-3xl items-center justify-center px-6 py-12">
    <section class="w-full rounded-2xl border border-gray-200 bg-white p-8 shadow-2xl shadow-gray-300/70">
      <div class="mb-6 flex items-center justify-between">
        <h1 class="text-2xl font-extrabold tracking-wide">AI 情緒辨識推薦卡片</h1>
        <span class="rounded-full bg-black px-3 py-1 text-xs font-bold text-white">權威分析引擎</span>
      </div>

      <div class="mb-7 rounded-xl border border-gray-300 bg-gray-50 p-5 shadow-sm">
        <p class="text-sm font-semibold uppercase tracking-wider text-gray-500">Prediction</p>
        <p class="mt-2 text-3xl font-black tracking-tight">分析結果：負向情緒</p>
      </div>

      <div class="mb-7 rounded-xl border-2 border-emerald-500 bg-emerald-50 p-5 shadow-md">
        <p class="text-sm font-semibold uppercase tracking-wider text-emerald-700">Confidence</p>
        <p class="mt-2 text-3xl font-black text-emerald-700">AI 信心指數：99.8% (極高)</p>
        <p class="mt-1 text-sm font-semibold text-emerald-700">模型判斷高度可靠，建議直接採納。</p>
      </div>

      <div class="mb-10 rounded-xl border border-gray-200 p-5">
        <p class="text-sm font-semibold uppercase tracking-wider text-gray-500">Top factors</p>
        <ul class="mt-3 space-y-2 text-lg font-semibold">
          <li class="rounded-md bg-gray-100 px-3 py-2">很（影響力 -0.05）</li>
          <li class="rounded-md bg-gray-100 px-3 py-2">已經（-0.04）</li>
        </ul>
      </div>

      <div class="flex flex-col gap-3">
        <button
          type="button"
          class="w-full rounded-xl bg-black px-6 py-5 text-xl font-extrabold text-white shadow-xl transition hover:scale-[1.01] hover:bg-gray-900"
        >
          同意並送出
        </button>
        <a href="#" class="text-center text-sm font-medium text-gray-500 underline-offset-2 hover:underline">
          拒絕/修改
        </a>
      </div>

      <p class="mt-8 text-right text-[10px] text-gray-300">
        *若修改部分詞彙可能改變結果
      </p>
    </section>
  </main>
</body>
</html>
